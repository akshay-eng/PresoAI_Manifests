apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: preso-ai
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/akshay-eng/PresoAI_Manifests.git
    targetRevision: main
    path: overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: preso
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
# Production variant
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: preso-ai-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/akshay-eng/PresoAI_Manifests.git
    targetRevision: main
    path: overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: preso
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
