apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: preso-ingress
  namespace: preso
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/websocket-services: "collabora"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - preso.ai
      secretName: preso-tls
  rules:
    - host: preso.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 3000
          - path: /cool
            pathType: Prefix
            backend:
              service:
                name: collabora
                port:
                  number: 9980
          - path: /browser
            pathType: Prefix
            backend:
              service:
                name: collabora
                port:
                  number: 9980
          - path: /hosting
            pathType: Prefix
            backend:
              service:
                name: collabora
                port:
                  number: 9980
