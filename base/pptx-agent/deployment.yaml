apiVersion: apps/v1
kind: Deployment
metadata:
  name: pptx-agent
  namespace: preso
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pptx-agent
  template:
    metadata:
      labels:
        app: pptx-agent
    spec:
      containers:
        - name: pptx-agent
          image: ak3hay/preso-pptx-agent:latest
          ports:
            - containerPort: 8100
          envFrom:
            - secretRef:
                name: preso-secrets
            - configMapRef:
                name: preso-config
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8100
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: pptx-agent
  namespace: preso
spec:
  selector:
    app: pptx-agent
  ports:
    - port: 8100
      targetPort: 8100
