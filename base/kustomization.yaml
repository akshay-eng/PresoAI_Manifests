apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: preso

resources:
  - namespace/namespace.yaml
  # secrets.yaml — managed manually with kubectl, not ArgoCD
  - configmap.yaml
  - postgres/deployment.yaml
  - redis/deployment.yaml
  - minio/deployment.yaml
  - collabora/deployment.yaml
  - web/deployment.yaml
  - python-agent/deployment.yaml
  - node-worker/deployment.yaml
  # pptx-agent removed — Claude Code agent runs locally, not in K8s
  - ingress.yaml
  - seed-job.yaml
