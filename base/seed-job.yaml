apiVersion: batch/v1
kind: Job
metadata:
  name: prisma-seed
  namespace: preso
  annotations:
    # Run AFTER prisma-migrate (wave 5) so the seed script sees the latest
    # schema. Otherwise seed.ts crashes when the code references columns
    # the DB hasn't migrated to yet (chicken-and-egg).
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "10"
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: seed
          image: node:20-alpine
          envFrom:
            - secretRef:
                name: preso-secrets
            - configMapRef:
                name: preso-config
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
          command:
            - sh
            - -c
            - |
              set -e
              apk add --no-cache git openssl
              cd /tmp
              git clone --depth 1 https://github.com/akshay-eng/PresoAI.git app
              cd app/packages/db
              npm install --no-audit --no-fund prisma@5.22.0 @prisma/client@5.22.0 bcryptjs@2.4.3 tsx@4.19.0 @types/bcryptjs
              npx prisma generate
              npx tsx prisma/seed.ts
              echo "Seed complete"
