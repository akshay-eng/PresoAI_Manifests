apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-agent
  namespace: preso
spec:
  replicas: 1
  selector:
    matchLabels:
      app: python-agent
  template:
    metadata:
      labels:
        app: python-agent
    spec:
      containers:
        - name: python-agent
          image: ak3hay/preso-python-agent:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: preso-secrets
            - configMapRef:
                name: preso-config
          env:
            - name: PYTHON_WORKER_CONCURRENCY
              value: "4"
          resources:
            # Bumped for Find feature: BGE-base (~440MB) + CLIP ViT-B-32
            # (~350MB) + torch runtime + working memory during inference.
            requests:
              cpu: 300m
              memory: 2Gi
            limits:
              cpu: "2000m"
              memory: 6Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            # Image is ~4 GB (models baked in); first pull on a fresh node
            # can take a couple minutes. Generous failure threshold.
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 24
---
apiVersion: v1
kind: Service
metadata:
  name: python-agent
  namespace: preso
spec:
  selector:
    app: python-agent
  ports:
    - port: 8000
      targetPort: 8000
