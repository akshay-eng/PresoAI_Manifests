apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: preso
  annotations:
    # Roll AFTER prisma-migrate (wave 5) and prisma-seed (wave 10) so a new
    # web image that references new schema columns/tables doesn't briefly
    # serve traffic against an un-migrated DB.
    argocd.argoproj.io/sync-wave: "20"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: ak3hay/preso-web:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: preso-secrets
            - configMapRef:
                name: preso-config
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: "500m"
              memory: 768Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: preso
spec:
  selector:
    app: web
  ports:
    - port: 3000
      targetPort: 3000
