apiVersion: batch/v1
kind: Job
metadata:
  name: prisma-seed
  namespace: preso
  annotations:
    # PostSync so deployments roll out FIRST, then seed runs.
    # Previously Sync-wave-10 blocked web pod updates until git clone + npm install finished.
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 120
  activeDeadlineSeconds: 600
  backoffLimit: 1
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: seed
          image: node:20-alpine
          envFrom:
            - secretRef:
                name: preso-secrets
            - configMapRef:
                name: preso-config
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
          command:
            - sh
            - -c
            - |
              set -e
              apk add --no-cache git openssl
              cd /tmp
              git clone --depth 1 https://github.com/akshay-eng/PresoAI.git app
              cd app/packages/db
              npm install --no-audit --no-fund prisma@5.22.0 @prisma/client@5.22.0 bcryptjs@2.4.3 tsx@4.19.0 @types/bcryptjs
              npx prisma generate
              npx tsx prisma/seed.ts
              echo "Seed complete"
